# Default values for my-website-2
replicaCount: 1

image:
  repository: ghcr.io/khala-smith/my-website-2
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
# For private GHCR: imagePullSecrets: [{name: ghcr-secret}]

containerPort: 3000

healthCheck:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 15

service:
  type: ClusterIP
  port: 80
  targetPort: http

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: my-website-2.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env: []
