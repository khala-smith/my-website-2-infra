apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-website-2-staging
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/khala-smith/my-website-2-infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/khala-smith/my-website-2-infra.git
      targetRevision: main
      path: chart
      helm:
        valueFiles:
          - $values/environments/staging/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: my-website-2-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
